<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pingolin</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
  <script type="module" crossorigin src="/assets/index-DWi5rrlw.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-B77NU3y7.css">
</head>
<body>
    <div id="app">
        <header>
            <div id="masthead">
              <p>&nbsp;</p>
              <h1><img id="logo" src="/favicon-32x32.png" /> pingolin <a id="toggle-add-btn" href="#" style="text-decoration: none; color: inherit; display: none; font-size: 0.8em; vertical-align: middle;">+</a></h1>
            </div>
            <div id="add-form" style="display: none;" data-testid="add-form">
                <input type="text" id="new-url" placeholder="https://..." data-testid="new-url">
                <input type="text" id="new-title" placeholder="Title" data-testid="new-title">
                <input type="text" id="new-tags" placeholder="Tags (space separated)" list="tag-suggestions" data-testid="new-tags">
                <datalist id="tag-suggestions"></datalist>
                <button id="add-button" data-testid="add-button">Add</button>
            </div>
            <div id="indicators">
                <div id="status" data-testid="sync-progress">Initializing...</div>
                <span id="offline-indicator" class="indicator" data-testid="network-status">OFFLINE</span>
                <span id="sync-indicator" class="indicator" data-testid="sync-status">SYNCING</span>
            </div>
        </header>
        <main>
            <div id="login-container" style="display: none;" data-testid="login-container">
                <input type="password" id="auth-token" placeholder="username:TOKEN" data-testid="auth-token">
                <button id="sync-button" data-testid="sync-button">Sync</button>
                <button id="reset-button">Reset</button>
            </div>
            <div id="search-container" style="display: none;">
                <div id="search-form">
                    <input type="text" id="search" placeholder="Search..." data-testid="search-input">
                </div>
                <div id="viewport">
                    <div id="canvas">
                        <ul id="bookmark-list"></ul>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
