<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pingolin</title>
    <link rel="icon" href="/favicon.ico">
    <style>
        :root { --bg: #0f0f0f; --fg: #e0e0e0; --accent: #ff3e00; --border: #333; }
        html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: 'JetBrains Mono', monospace, system-ui; line-height: 1.5; height: 100vh; overflow: hidden; }
        #elm-app { height: 100vh; width: 100vw; display: flex; flex-direction: column; overflow: hidden; }
        .pingolin-fortress { padding: 2rem; max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; width: 100%; overflow: hidden; }
        h1 { font-size: 3rem; font-weight: 900; letter-spacing: -2px; color: var(--accent); margin: 0 0 1rem 0; text-transform: uppercase; flex-shrink: 0; }
        .ritual-controls, .search-chamber { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-shrink: 0; }
        input { background: #1a1a1a; border: 1px solid var(--border); color: var(--fg); padding: 0.5rem; flex: 1; font-family: inherit; }
        input:focus { border-color: var(--accent); outline: none; }
        button { background: var(--accent); border: none; color: #fff; padding: 0.5rem 1rem; font-weight: bold; cursor: pointer; text-transform: uppercase; flex-shrink: 0; }
        button:hover { filter: brightness(1.2); }
        .status-chamber { margin-bottom: 1rem; padding: 1rem; border: 1px solid var(--border); font-size: 0.8rem; background: #141414; flex-shrink: 0; }
        .progress-bar { height: 4px; background: #222; margin-top: 0.5rem; position: relative; overflow: hidden; }
        .progress-fill { position: absolute; height: 100%; background: var(--accent); transition: width 0.3s ease-out; }
        .archive-scroll-container { flex: 1; overflow-y: auto; position: relative; width: 100%; min-height: 0; }
        .archive-height-spacer { width: 100%; position: relative; }
        .bookmark-shrine { padding: 1rem; border-left: 2px solid var(--border); transition: border-color 0.2s; box-sizing: border-box; background: var(--bg); }
        .bookmark-shrine:hover { border-color: var(--accent); background: #141414; }
        .href { font-size: 0.7rem; color: #666; word-break: break-all; margin-bottom: 0.2rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .desc { font-weight: bold; margin-bottom: 0.3rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .tags { font-size: 0.8rem; color: var(--accent); opacity: 0.8; }
        .offline-banner { background: #ff0000; color: #fff; padding: 0.5rem; text-align: center; font-weight: bold; flex-shrink: 0; z-index: 100; }
        .add-form { background: #1a1a1a; border: 1px solid var(--border); padding: 1rem; margin-bottom: 1rem; display: flex; flex-direction: column; gap: 0.5rem; flex-shrink: 0; }
        .pending-icon { float: right; color: var(--accent); }
    </style>
</head>
<body>
    <div id="elm-app"></div>
    <script src="/main.js"></script>
    <script src="/app.js"></script>
</body>
</html>
