<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinboard PWA</title>
    <link rel="stylesheet" href="./src/style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Pinboard PWA</h1>
            <div id="add-form">
                <input type="text" id="new-url" placeholder="https://...">
                <input type="text" id="new-title" placeholder="Title">
                <button id="add-button">Add</button>
            </div>
            <div id="indicators">
                <span id="offline-indicator" class="indicator">OFFLINE</span>
                <span id="sync-indicator" class="indicator">SYNCING...</span>
                <div id="status">Initializing...</div>
            </div>
        </header>
        <main>
            <div id="login-container" style="display: none;">
                <input type="password" id="auth-token" placeholder="username:TOKEN">
                <button id="sync-button">Initial Sync</button>
            </div>
            <div id="search-container" style="display: none;">
                <input type="text" id="search" placeholder="Search 22,000+ bookmarks...">
                <div id="viewport">
                    <div id="canvas">
                        <ul id="bookmark-list"></ul>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script type="module" src="./src/main.ts"></script>
</body>
</html>
